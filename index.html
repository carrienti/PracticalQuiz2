<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Open-Plan Interior – A-Frame</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body { margin: 0; }
    #controls {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 999;
      background: rgba(0,0,0,0.45);
      padding: 10px 18px; border-radius: 30px;
      border: 1px solid rgba(180,160,120,0.5);
    }
    #controls button {
      background: rgba(180,160,120,0.15); color: #c8b890;
      border: 1px solid rgba(180,160,120,0.6);
      padding: 7px 14px; border-radius: 20px;
      cursor: pointer; font-size: 12px;
      font-family: sans-serif; letter-spacing: 1px;
      transition: background 0.2s;
    }
    #controls button:hover { background: rgba(180,160,120,0.4); }
    #hint {
      position: fixed; top: 14px; left: 50%;
      transform: translateX(-50%);
      color: rgba(200,180,140,0.95); font-family: sans-serif;
      font-size: 12px; letter-spacing: 2px; z-index: 999;
      pointer-events: none; background: rgba(0,0,0,0.45);
      padding: 5px 16px; border-radius: 20px;
    }
  </style>
</head>
<body>
<div id="hint">DRAG TO LOOK · WASD TO MOVE · ARROW KEYS TO ROTATE</div>
<div id="controls">
  <button onclick="setView('front')">Front</button>
  <button onclick="setView('side')">Side</button>
  <button onclick="setView('kitchen')">Kitchen</button>
  <button onclick="setView('top')">Top</button>
  <button onclick="setView('angle')">Angle</button>
  <button onclick="setView('close')">Close-up</button>
</div>

<script>
  const rig = document.getElementById('rig');
  const cam = document.getElementById('cam');

  const views = {
    front:   { pos:{x:0,   y:1.6, z:3.5 }, rot:{x:0,   y:0,   z:0} },
    side:    { pos:{x:4.0, y:1.6, z:0.5 }, rot:{x:0,   y:-90, z:0} },
    kitchen: { pos:{x:-2.5,y:1.7, z:1.5 }, rot:{x:-8,  y:-35, z:0} },
    top:     { pos:{x:0,   y:5.5, z:0.5 }, rot:{x:-89, y:0,   z:0} },
    angle:   { pos:{x:2.5, y:2.5, z:2.8 }, rot:{x:-18, y:-40, z:0} },
    close:   { pos:{x:0,   y:1.2, z:1.8 }, rot:{x:-12, y:0,   z:0} },
  };

  function setView(name) {
    const v = views[name];
    if (!v) return;
    rig.setAttribute('position', v.pos);
    cam.setAttribute('rotation', v.rot);
  }

  let rotX = 0, rotY = 0;
  document.addEventListener('keydown', e => {
    const s = 15;
    if (e.key==='ArrowLeft')  rotY -= s;
    if (e.key==='ArrowRight') rotY += s;
    if (e.key==='ArrowUp')    rotX -= s;
    if (e.key==='ArrowDown')  rotX += s;
    rotX = Math.max(-89, Math.min(89, rotX));
    cam.setAttribute('rotation', {x:rotX, y:rotY, z:0});
  });
</script>

<script>
  // ══════════════════════════════════════════════
  // MILO TIN COMPONENT — must be AFTER a-scene
  // ══════════════════════════════════════════════
  AFRAME.registerComponent('milo-tin', {
    init: function () {
      const el = this.el;
      const loader = new THREE.TextureLoader();
      loader.load(
        'milo.png',
        function (texture) {
          texture.wrapS = THREE.RepeatWrapping;
          texture.wrapT = THREE.ClampToEdgeWrapping;
          texture.repeat.set(1, 1);
          // ── Sharp texture settings ──
          texture.anisotropy = 16;
          texture.minFilter = THREE.LinearMipMapLinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.generateMipmaps = true;
          texture.needsUpdate = true;
          const geo = new THREE.CylinderGeometry(0.165, 0.165, 0.55, 128, 1, true);
          const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.35, metalness: 0.1, side: THREE.FrontSide });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(0, 0.28, 0);
          const capGeo = new THREE.CircleGeometry(0.165, 64);
          const capMat = new THREE.MeshStandardMaterial({ color: 0x1a6b1a });
          const topCap = new THREE.Mesh(capGeo, capMat);
          topCap.rotation.x = -Math.PI / 2;
          topCap.position.set(0, 0.556, 0);
          const botCap = new THREE.Mesh(capGeo, capMat);
          botCap.rotation.x = Math.PI / 2;
          botCap.position.set(0, 0.006, 0);
          el.object3D.add(mesh);
          el.object3D.add(topCap);
          el.object3D.add(botCap);
        },
        undefined,
        function (err) {
          console.warn('milo.png not found — using green fallback');
          const geo = new THREE.CylinderGeometry(0.11, 0.11, 0.36, 64, 1, false);
          const mat = new THREE.MeshStandardMaterial({ color: 0x1a6b1a });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(0, 0.18, 0);
          el.object3D.add(mesh);
        }
      );
    }
  });

          texture.wrapT = THREE.ClampToEdgeWrapping;

          // ── Sharp texture settings ──
          texture.anisotropy = 16;
          texture.minFilter = THREE.LinearMipMapLinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.generateMipmaps = true;
          texture.needsUpdate = true;
          const geo = new THREE.CylinderGeometry(0.165, 0.165, 0.55, 128, 1, true);
          const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.35, metalness: 0.1, side: THREE.FrontSide });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(0, 0.28, 0);
          // White/cream top cap to match milk branding
          const capGeo = new THREE.CircleGeometry(0.165, 64);
          const capMat = new THREE.MeshStandardMaterial({ color: 0xf0ece4 });
          const topCap = new THREE.Mesh(capGeo, capMat);
          topCap.rotation.x = -Math.PI / 2;
          topCap.position.set(0, 0.556, 0);
          const botCap = new THREE.Mesh(capGeo, capMat);
          botCap.rotation.x = Math.PI / 2;
          botCap.position.set(0, 0.006, 0);
          el.object3D.add(mesh);
          el.object3D.add(topCap);
          el.object3D.add(botCap);
        },
        undefined,
        function (err) {
          console.warn('milk.jpg not found — using cream fallback');
          const geo = new THREE.CylinderGeometry(0.11, 0.11, 0.36, 64, 1, false);
          const mat = new THREE.MeshStandardMaterial({ color: 0xf0ece4 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(0, 0.18, 0);
          el.object3D.add(mesh);
        }
      );
    }
  });

  // ══════════════════════════════════════════════
  // SUGAR TIN COMPONENT — smaller than Milo

  AFRAME.registerComponent('sugar-tin', {
